name: Sync from upstream Xexr/gt-toolkit

on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebase onto upstream
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/Xexr/gt-toolkit.git
          git fetch upstream main

          # Fast-exit if we already contain everything upstream has
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream/main — nothing to do."
            exit 0
          fi

          # Try to rebase local commits on top of upstream/main.
          # On conflict: abort cleanly, fail the job so a human resolves it.
          if git rebase upstream/main; then
            echo "Rebase clean — pushing."
            git push --force-with-lease origin main
          else
            git rebase --abort || true
            echo ""
            echo "::error::Rebase onto upstream/main failed due to conflicts."
            echo ""
            echo "Resolve locally:"
            echo "  git fetch upstream"
            echo "  git rebase upstream/main"
            echo "  # fix conflicts, then:"
            echo "  git add <files>"
            echo "  git rebase --continue"
            echo "  git push --force-with-lease origin main"
            exit 1
          fi
