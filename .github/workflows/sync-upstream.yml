name: Sync from upstream Xexr/gt-toolkit

on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save our workflow files (not in upstream)
          mkdir -p /tmp/gh-workflows
          cp -r .github/workflows/* /tmp/gh-workflows/

          # Fetch upstream and reset
          git remote add upstream https://github.com/Xexr/gt-toolkit.git
          git fetch upstream main
          git reset --hard upstream/main

          # Restore our workflow files
          mkdir -p .github/workflows
          cp -r /tmp/gh-workflows/* .github/workflows/
          git add .github/workflows/

          # Commit and push only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "ci: sync from upstream Xexr/gt-toolkit"
            git push origin main --force
          else
            git push origin main --force
          fi
